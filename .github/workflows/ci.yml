name: CI

# Run linting and tests on every push to any branch.
on: push

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # CI=true makes the Create React App test runner execute
      # the suite once and exit instead of starting watch mode.
      - name: Test
        run: npm test
        env:
          CI: true
